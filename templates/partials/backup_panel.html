<!-- Backup & Restore Panel Partial — served by /partials/backup-panel -->
<div class="space-y-4">
    <!-- Status messages -->
    <div id="backup-status"></div>

    <!-- Create / Import buttons -->
    <div class="flex items-center gap-3">
        <button hx-post="/action/backup/create"
                hx-target="#backup-status"
                hx-swap="innerHTML"
                hx-indicator="#backup-spinner"
                class="px-4 py-2 bg-brand-green text-black font-bold rounded-lg text-sm hover:opacity-90 transition-opacity">
            ⚡ Create Backup
        </button>
        <span id="backup-spinner" class="htmx-indicator text-sm text-gray-400">Creating...</span>

        <!-- Import backup file upload -->
        <form hx-post="/action/backup/upload"
              hx-target="#backup-status"
              hx-swap="innerHTML"
              hx-encoding="multipart/form-data"
              hx-indicator="#import-spinner"
              class="flex items-center gap-2">
            <input type="file" name="backup_file" accept=".zip,.tar.gz,.sql"
                   class="text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
            <button type="submit"
                    class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs text-gray-200 transition-colors whitespace-nowrap">
                Import
            </button>
        </form>
        <span id="import-spinner" class="htmx-indicator text-sm text-gray-400">Uploading...</span>
    </div>

    <!-- Backups list -->
    {% if backups %}
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="text-gray-500 text-xs uppercase tracking-wider border-b border-gray-800">
                    <th class="text-left py-2 pr-4">Filename</th>
                    <th class="text-left py-2 pr-4">Size</th>
                    <th class="text-left py-2 pr-4">Date</th>
                    <th class="text-right py-2">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-800/50">
                {% for b in backups %}
                <tr class="hover:bg-gray-800/30 transition-colors">
                    <td class="py-2.5 pr-4 font-mono text-xs text-gray-300">{{ b.filename }}</td>
                    <td class="py-2.5 pr-4 text-gray-400">{{ b.size }}</td>
                    <td class="py-2.5 pr-4 text-gray-400">{{ b.date }}</td>
                    <td class="py-2.5 text-right">
                        <div class="flex items-center justify-end gap-1.5">
                            <button hx-post="/action/backup/restore"
                                    hx-target="#backup-status"
                                    hx-swap="innerHTML"
                                    hx-vals='{"backup_id": "{{ b.id }}"}'
                                    hx-confirm="Restore backup '{{ b.filename }}'? This will overwrite current data. Continue?"
                                    class="px-2.5 py-1 bg-amber-900/50 hover:bg-amber-800/60 text-amber-300 rounded text-xs transition-colors">
                                Restore
                            </button>
                            <button hx-post="/action/backup/delete/{{ b.id }}"
                                    hx-target="#backup-panel"
                                    hx-swap="outerHTML"
                                    hx-confirm="Delete backup '{{ b.filename }}'? This cannot be undone."
                                    class="px-2.5 py-1 bg-red-900/40 hover:bg-red-800/50 text-red-400 rounded text-xs transition-colors">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="text-sm text-gray-500 py-4 text-center border border-dashed border-gray-800 rounded-lg">
        No backups yet. Create your first backup to secure your data.
    </div>
    {% endif %}
</div>
