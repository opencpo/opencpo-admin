{% for cp in chargers %}
<tr class="border-b border-gray-800 hover:bg-gray-800/50" id="row-{{ cp.id }}">
    <td class="p-3 font-mono font-bold">
        <a href="/remote/{{ cp.id }}" class="text-brand-blue hover:underline">{{ cp.id }}</a>
        {% if cp.simulated %}<span class="text-xs text-yellow-500 ml-1">SIM</span>{% endif %}
    </td>
    <td class="p-3">{{ cp.vendor }}</td>
    <td class="p-3">{{ cp.model }}</td>
    <td class="p-3 font-mono text-xs text-gray-400">{{ cp.serial_number or '—' }}</td>
    <td class="p-3 text-xs">{{ cp.firmware_version or '—' }}</td>
    <td class="p-3">{{ cp.ocpp_version }}</td>
    <td class="p-3">
        <span class="status-{{ cp.status }}">●</span>
        <span class="{% if cp.status == 'online' %}text-green-400{% else %}text-red-400{% endif %}">
            {{ cp.status }}
        </span>
    </td>
    <td class="p-3">{{ cp.site or '—' }}</td>
    <td class="p-3 text-gray-400 text-xs">{{ cp.last_boot or '—' }}</td>
    <td class="p-3 text-right space-x-1">
        <button hx-post="/action/start/{{ cp.id }}" hx-swap="outerHTML" title="Remote Start — begin a charging session"
                class="px-2 py-1 bg-green-700 rounded text-xs hover:bg-green-600">▶</button>
        <button hx-post="/action/stop/{{ cp.id }}" hx-swap="outerHTML" title="Remote Stop — end the active session"
                class="px-2 py-1 bg-yellow-700 rounded text-xs hover:bg-yellow-600">⏹</button>
        <button hx-post="/action/reset/{{ cp.id }}" hx-swap="outerHTML" title="Reset — reboot the charger"
                class="px-2 py-1 bg-blue-700 rounded text-xs hover:bg-blue-600">↻</button>
        <button onclick="openEditModal('{{ cp.id }}','{{ cp.vendor }}','{{ cp.model }}','{{ cp.serial_number or '' }}','{{ cp.ocpp_version }}','{{ cp.site or '' }}')"
                class="px-2 py-1 bg-gray-700 rounded text-xs hover:bg-gray-600" title="Edit charger details">✏️</button>
        <button onclick="confirmDelete('{{ cp.id }}')"
                class="px-2 py-1 bg-red-800 rounded text-xs hover:bg-red-700" title="Delete this charger">🗑</button>
    </td>
</tr>
{% endfor %}
